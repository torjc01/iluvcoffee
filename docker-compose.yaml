version: "3"

services:
  db:
    container_name: iLuvCoffe-db
    image: postgres
    restart: always
    ports: 
      - "5432:5432"
    env_file:
      - .env
    #environment:
    #  - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      #- POSTGRES_PASSWORD=pass123
    networks:
      - iLuvCoffee

  pgadmin:
    container_name: iLuvCoffe-pgadmin
    image: dpage/pgadmin4:6.18
    networks:
      - iLuvCoffee
    ports:
      - 8080:80
    volumes:
      - ./data/pgadmin:/root/.pgadmin
    env_file:
      - .env
    depends_on:
      - db

networks:
  iLuvCoffee: